{% extends "blog_base.html" %}

{% block title %}DevBlog - All Posts{% endblock %}

{% block content %}
<div style="border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 2rem;">
    <h1 style="margin: 0;">All Blog Posts</h1>
    <p class="text-muted" style="margin-top: 0.5rem;">Browse all our articles and ideas.</p>
</div>

<div class="grid">
    {% for post in posts %}
    <div class="card">
        <h3>
            <a href="{{ url_for('blog_detail', post_id=post.id) }}" style="color: inherit; text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='inherit'">
                {{ post.title }}
            </a>
        </h3>
        <p class="text-muted" style="margin-bottom: 1rem;">{{ post.date }} &bull; By {{ post.author }}</p>
        <p style="color: #cbd5e1; margin-bottom: 1.5rem;">{{ post.summary }}</p>
        <a href="{{ url_for('blog_detail', post_id=post.id) }}" class="text-primary" style="text-decoration: none; font-weight: 600; font-size: 0.95rem;">Read more &rarr;</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
