<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{{ title or "My Website" }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header,
        footer {
            background: #333;
            color: white;
            padding: 1em;
        }

        nav a {
            color: white;
            margin-right: 1em;
            text-decoration: none;
        }

        main {
            padding: 1em;
        }
    </style>
</head>

<body>
    <header>
        <h1>My Website</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/about">About</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; {{ 2026 }} My Website</p>
    </footer>
</body>

</html>
