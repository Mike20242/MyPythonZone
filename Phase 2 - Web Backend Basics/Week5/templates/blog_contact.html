{% extends "blog_base.html" %}

{% block title %}DevBlog - Contact{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: auto; padding: 3rem;">
    <h1 style="text-align: center; margin-bottom: 0.5rem;">Get In Touch</h1>
    <p class="text-muted" style="text-align: center; margin-bottom: 2.5rem;">We would love to hear from you. Send us a message!</p>
    
    <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Message sent successfully!'); this.reset();">
        <div>
            <label>Full Name</label>
            <input type="text" name="name" required placeholder="John Doe">
        </div>
        <div>
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="john@example.com">
        </div>
        <div>
            <label>Your Message</label>
            <textarea name="message" rows="5" required placeholder="How can we help you?"></textarea>
        </div>
        <button type="submit" class="btn" style="width: 100%; font-size: 1.1rem; padding: 1.2rem; margin-top: 1rem;">Send Message</button>
    </form>
</div>
{% endblock %}
